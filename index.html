<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>P2P通信テスト</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }
    h1 { margin-bottom: 20px; color: #00d4ff; }
    .status {
      padding: 8px 16px;
      border-radius: 20px;
      margin-bottom: 20px;
      font-weight: bold;
    }
    .status.disconnected { background: #4a1a1a; color: #ff6b6b; }
    .status.connecting { background: #4a3a1a; color: #ffd93d; }
    .status.connected { background: #1a4a2a; color: #6bff6b; }

    .section {
      background: #16213e;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
      width: 100%;
      max-width: 600px;
    }
    .section h2 {
      font-size: 1rem;
      color: #00d4ff;
      margin-bottom: 12px;
    }
    button {
      background: #0f3460;
      color: #e0e0e0;
      border: 1px solid #00d4ff;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      margin: 4px;
      transition: background 0.2s;
    }
    button:hover { background: #1a5276; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    textarea {
      width: 100%;
      height: 100px;
      background: #0a0a1a;
      color: #e0e0e0;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 10px;
      font-family: monospace;
      font-size: 0.8rem;
      resize: vertical;
      margin-top: 8px;
    }
    #chat-log {
      height: 200px;
      overflow-y: auto;
      background: #0a0a1a;
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 10px;
      font-size: 0.9rem;
    }
    #chat-log .msg { margin-bottom: 4px; }
    #chat-log .msg.self { color: #00d4ff; }
    #chat-log .msg.peer { color: #ffd93d; }
    #chat-log .msg.system { color: #888; font-style: italic; }
    .chat-input {
      display: flex;
      gap: 8px;
    }
    .chat-input input {
      flex: 1;
      background: #0a0a1a;
      color: #e0e0e0;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 10px;
      font-size: 0.9rem;
    }
    .step-buttons { display: flex; flex-wrap: wrap; gap: 8px; }
  </style>
</head>
<body>
  <h1>P2P通信テスト</h1>
  <div id="status" class="status disconnected">未接続</div>

  <!-- Step 1: Role selection -->
  <div class="section" id="role-section">
    <h2>1. 役割を選択</h2>
    <div class="step-buttons">
      <button onclick="createOffer()">ホスト（部屋を作る）</button>
      <button onclick="showGuestUI()">ゲスト（部屋に入る）</button>
    </div>
  </div>

  <!-- Step 2: SDP exchange -->
  <div class="section" id="sdp-section" style="display:none;">
    <h2 id="sdp-title"></h2>
    <p id="sdp-instruction" style="font-size:0.85rem; margin-bottom:8px;"></p>
    <textarea id="sdp-local" readonly placeholder="ここにSDPが生成されます..."></textarea>
    <p id="sdp-size" style="font-size:0.8rem; color:#888; margin-top:4px;"></p>
    <button onclick="copySDP()">SDPをコピー</button>
    <hr style="border-color:#333; margin:12px 0;">
    <p id="sdp-paste-instruction" style="font-size:0.85rem; margin-bottom:8px;"></p>
    <textarea id="sdp-remote" placeholder="相手のSDPをここに貼り付け..."></textarea>
    <button id="apply-btn" onclick="applyRemoteSDP()">接続</button>
  </div>

  <!-- Chat -->
  <div class="section" id="chat-section" style="display:none;">
    <h2>チャット</h2>
    <div id="chat-log"></div>
    <div class="chat-input">
      <input type="text" id="chat-input" placeholder="メッセージを入力..." onkeydown="if(event.key==='Enter')sendMessage()">
      <button onclick="sendMessage()">送信</button>
    </div>
  </div>

  <script>
    let pc = null;
    let dc = null;
    let isHost = false;

    const statusEl = document.getElementById('status');
    const sdpSection = document.getElementById('sdp-section');
    const chatSection = document.getElementById('chat-section');

    function setStatus(text, state) {
      statusEl.textContent = text;
      statusEl.className = 'status ' + state;
    }

    function addChatMsg(text, cls) {
      const log = document.getElementById('chat-log');
      const div = document.createElement('div');
      div.className = 'msg ' + cls;
      div.textContent = text;
      log.appendChild(div);
      log.scrollTop = log.scrollHeight;
    }

    function createPeerConnection() {
      pc = new RTCPeerConnection({
        iceServers: [
          { urls: 'stun:stun.l.google.com:19302' },
          { urls: 'stun:stun1.l.google.com:19302' },
        ]
      });

      pc.oniceconnectionstatechange = () => {
        if (pc.iceConnectionState === 'connected' || pc.iceConnectionState === 'completed') {
          setStatus('接続済み', 'connected');
          chatSection.style.display = '';
          addChatMsg('P2P接続が確立しました！', 'system');
        } else if (pc.iceConnectionState === 'disconnected' || pc.iceConnectionState === 'failed') {
          setStatus('切断', 'disconnected');
          addChatMsg('接続が切断されました', 'system');
        }
      };
    }

    function setupDataChannel(channel) {
      dc = channel;
      dc.onopen = () => {
        addChatMsg('データチャネルが開きました', 'system');
      };
      dc.onmessage = (e) => {
        addChatMsg('相手: ' + e.data, 'peer');
      };
      dc.onclose = () => {
        addChatMsg('データチャネルが閉じました', 'system');
      };
    }

    // --- SDP compression ---
    // Strip unnecessary lines from SDP, deflate compress, base64url encode.
    // Original SDP format is preserved (no reconstruction) for maximum compatibility.

    // Lines essential for DataChannel-only WebRTC connection
    const KEEP_PREFIXES = [
      'v=', 'o=', 's=', 't=', 'a=group:', 'a=msid-semantic:',
      'm=application', 'c=', 'a=ice-ufrag:', 'a=ice-pwd:',
      'a=ice-options:', 'a=fingerprint:', 'a=setup:', 'a=mid:',
      'a=sctp-port:', 'a=max-message-size:', 'a=candidate:',
      'a=end-of-candidates', 'a=extmap-allow-mixed',
    ];

    function stripSDP(sdp) {
      return sdp.split('\r\n')
        .filter(line => line === '' || KEEP_PREFIXES.some(p => line.startsWith(p)))
        .join('\r\n');
    }

    async function deflate(text) {
      const blob = new Blob([text]);
      const cs = new CompressionStream('deflate-raw');
      const buf = await new Response(blob.stream().pipeThrough(cs)).arrayBuffer();
      let b64 = btoa(String.fromCharCode(...new Uint8Array(buf)));
      return b64.replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
    }

    async function inflate(encoded) {
      let b64 = encoded.replace(/-/g, '+').replace(/_/g, '/');
      while (b64.length % 4) b64 += '=';
      const bytes = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
      const ds = new DecompressionStream('deflate-raw');
      return await new Response(new Blob([bytes]).stream().pipeThrough(ds)).text();
    }

    async function encodeSDP(sdpObj) {
      const stripped = stripSDP(sdpObj.sdp);
      // Pack type + sdp into a single string: "o|..." or "a|..."
      const packed = (sdpObj.type === 'offer' ? 'o' : 'a') + '|' + stripped;
      const encoded = await deflate(packed);
      // Show compression stats
      const origSize = btoa(JSON.stringify(sdpObj)).length;
      const sizeEl = document.getElementById('sdp-size');
      sizeEl.textContent = `${encoded.length}文字 (圧縮前: ${origSize}文字 → ${Math.round((1 - encoded.length / origSize) * 100)}%削減)`;
      return encoded;
    }

    async function decodeSDP(encoded) {
      const packed = await inflate(encoded);
      const sep = packed.indexOf('|');
      const type = packed[0] === 'o' ? 'offer' : 'answer';
      const sdp = packed.slice(sep + 1);
      return { type, sdp };
    }

    async function createOffer() {
      isHost = true;
      setStatus('接続待ち...', 'connecting');
      createPeerConnection();

      const channel = pc.createDataChannel('game');
      setupDataChannel(channel);

      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);

      // Wait for ICE gathering to complete
      await new Promise((resolve) => {
        if (pc.iceGatheringState === 'complete') {
          resolve();
        } else {
          pc.onicegatheringstatechange = () => {
            if (pc.iceGatheringState === 'complete') resolve();
          };
        }
      });

      const encoded = await encodeSDP(pc.localDescription);

      document.getElementById('sdp-title').textContent = '2. ホスト: SDP交換';
      document.getElementById('sdp-instruction').textContent =
        '下のテキストをコピーして、チャットツールで相手に送ってください。';
      document.getElementById('sdp-local').value = encoded;
      document.getElementById('sdp-paste-instruction').textContent =
        '相手から受け取ったAnswer SDPを貼り付けてください。';
      document.getElementById('apply-btn').textContent = '接続を確立';
      sdpSection.style.display = '';
      document.getElementById('role-section').style.display = 'none';
    }

    function showGuestUI() {
      isHost = false;
      setStatus('SDP入力待ち...', 'connecting');

      document.getElementById('sdp-title').textContent = '2. ゲスト: SDP交換';
      document.getElementById('sdp-instruction').textContent = '';
      document.getElementById('sdp-local').style.display = 'none';
      document.querySelector('[onclick="copySDP()"]').style.display = 'none';
      document.getElementById('sdp-paste-instruction').textContent =
        'ホストから受け取ったOffer SDPを貼り付けてください。';
      document.getElementById('apply-btn').textContent = 'Answer SDPを生成';
      sdpSection.style.display = '';
      document.getElementById('role-section').style.display = 'none';
    }

    async function applyRemoteSDP() {
      const remoteText = document.getElementById('sdp-remote').value.trim();
      if (!remoteText) {
        alert('SDPを貼り付けてください');
        return;
      }

      try {
        const remoteSDP = await decodeSDP(remoteText);

        if (isHost) {
          // Host receives Answer
          await pc.setRemoteDescription(new RTCSessionDescription(remoteSDP));
        } else {
          // Guest receives Offer, creates Answer
          createPeerConnection();
          pc.ondatachannel = (e) => setupDataChannel(e.channel);

          await pc.setRemoteDescription(new RTCSessionDescription(remoteSDP));
          const answer = await pc.createAnswer();
          await pc.setLocalDescription(answer);

          // Wait for ICE gathering
          await new Promise((resolve) => {
            if (pc.iceGatheringState === 'complete') {
              resolve();
            } else {
              pc.onicegatheringstatechange = () => {
                if (pc.iceGatheringState === 'complete') resolve();
              };
            }
          });

          const encoded = await encodeSDP(pc.localDescription);

          // Show the Answer SDP for the guest to copy
          document.getElementById('sdp-instruction').textContent =
            '下のAnswer SDPをコピーしてホストに送ってください。';
          document.getElementById('sdp-local').style.display = '';
          document.getElementById('sdp-local').value = encoded;
          document.querySelector('[onclick="copySDP()"]').style.display = '';

          // Hide the paste area
          document.getElementById('sdp-paste-instruction').style.display = 'none';
          document.getElementById('sdp-remote').style.display = 'none';
          document.getElementById('apply-btn').style.display = 'none';
        }
      } catch (e) {
        alert('SDPの読み取りに失敗しました: ' + e.message);
      }
    }

    function copySDP() {
      const text = document.getElementById('sdp-local').value;
      navigator.clipboard.writeText(text).then(() => {
        const btn = document.querySelector('[onclick="copySDP()"]');
        btn.textContent = 'コピーしました！';
        setTimeout(() => btn.textContent = 'SDPをコピー', 2000);
      });
    }

    function sendMessage() {
      const input = document.getElementById('chat-input');
      const msg = input.value.trim();
      if (!msg || !dc || dc.readyState !== 'open') return;
      dc.send(msg);
      addChatMsg('自分: ' + msg, 'self');
      input.value = '';
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>P2P通信テスト</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }
    h1 { margin-bottom: 20px; color: #00d4ff; }
    .status {
      padding: 8px 16px;
      border-radius: 20px;
      margin-bottom: 20px;
      font-weight: bold;
    }
    .status.disconnected { background: #4a1a1a; color: #ff6b6b; }
    .status.connecting { background: #4a3a1a; color: #ffd93d; }
    .status.connected { background: #1a4a2a; color: #6bff6b; }

    .section {
      background: #16213e;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
      width: 100%;
      max-width: 600px;
    }
    .section h2 {
      font-size: 1rem;
      color: #00d4ff;
      margin-bottom: 12px;
    }
    button {
      background: #0f3460;
      color: #e0e0e0;
      border: 1px solid #00d4ff;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      margin: 4px;
      transition: background 0.2s;
    }
    button:hover { background: #1a5276; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    textarea {
      width: 100%;
      height: 100px;
      background: #0a0a1a;
      color: #e0e0e0;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 10px;
      font-family: monospace;
      font-size: 0.8rem;
      resize: vertical;
      margin-top: 8px;
    }
    #chat-log {
      height: 200px;
      overflow-y: auto;
      background: #0a0a1a;
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 10px;
      font-size: 0.9rem;
    }
    #chat-log .msg { margin-bottom: 4px; }
    #chat-log .msg.self { color: #00d4ff; }
    #chat-log .msg.peer { color: #ffd93d; }
    #chat-log .msg.system { color: #888; font-style: italic; }
    .chat-input {
      display: flex;
      gap: 8px;
    }
    .chat-input input {
      flex: 1;
      background: #0a0a1a;
      color: #e0e0e0;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 10px;
      font-size: 0.9rem;
    }
    .step-buttons { display: flex; flex-wrap: wrap; gap: 8px; }
  </style>
</head>
<body>
  <h1>P2P通信テスト</h1>
  <div id="status" class="status disconnected">未接続</div>

  <!-- Step 1: Role selection -->
  <div class="section" id="role-section">
    <h2>1. 役割を選択</h2>
    <div class="step-buttons">
      <button onclick="createOffer()">ホスト（部屋を作る）</button>
      <button onclick="showGuestUI()">ゲスト（部屋に入る）</button>
    </div>
  </div>

  <!-- Step 2: SDP exchange -->
  <div class="section" id="sdp-section" style="display:none;">
    <h2 id="sdp-title"></h2>
    <p id="sdp-instruction" style="font-size:0.85rem; margin-bottom:8px;"></p>
    <textarea id="sdp-local" readonly placeholder="ここにSDPが生成されます..."></textarea>
    <p id="sdp-size" style="font-size:0.8rem; color:#888; margin-top:4px;"></p>
    <button onclick="copySDP()">SDPをコピー</button>
    <hr style="border-color:#333; margin:12px 0;">
    <p id="sdp-paste-instruction" style="font-size:0.85rem; margin-bottom:8px;"></p>
    <textarea id="sdp-remote" placeholder="相手のSDPをここに貼り付け..."></textarea>
    <button id="apply-btn" onclick="applyRemoteSDP()">接続</button>
  </div>

  <!-- Chat -->
  <div class="section" id="chat-section" style="display:none;">
    <h2>チャット</h2>
    <div id="chat-log"></div>
    <div class="chat-input">
      <input type="text" id="chat-input" placeholder="メッセージを入力..." onkeydown="if(event.key==='Enter')sendMessage()">
      <button onclick="sendMessage()">送信</button>
    </div>
  </div>

  <script>
    let pc = null;
    let dc = null;
    let isHost = false;

    const statusEl = document.getElementById('status');
    const sdpSection = document.getElementById('sdp-section');
    const chatSection = document.getElementById('chat-section');

    function setStatus(text, state) {
      statusEl.textContent = text;
      statusEl.className = 'status ' + state;
    }

    function addChatMsg(text, cls) {
      const log = document.getElementById('chat-log');
      const div = document.createElement('div');
      div.className = 'msg ' + cls;
      div.textContent = text;
      log.appendChild(div);
      log.scrollTop = log.scrollHeight;
    }

    function createPeerConnection() {
      pc = new RTCPeerConnection({
        iceServers: [
          { urls: 'stun:stun.l.google.com:19302' },
          { urls: 'stun:stun1.l.google.com:19302' },
        ]
      });

      pc.oniceconnectionstatechange = () => {
        if (pc.iceConnectionState === 'connected' || pc.iceConnectionState === 'completed') {
          setStatus('接続済み', 'connected');
          chatSection.style.display = '';
          addChatMsg('P2P接続が確立しました！', 'system');
        } else if (pc.iceConnectionState === 'disconnected' || pc.iceConnectionState === 'failed') {
          setStatus('切断', 'disconnected');
          addChatMsg('接続が切断されました', 'system');
        }
      };
    }

    function setupDataChannel(channel) {
      dc = channel;
      dc.onopen = () => {
        addChatMsg('データチャネルが開きました', 'system');
      };
      dc.onmessage = (e) => {
        addChatMsg('相手: ' + e.data, 'peer');
      };
      dc.onclose = () => {
        addChatMsg('データチャネルが閉じました', 'system');
      };
    }

    // --- SDP compression (LZ-based, pure JS, no browser API dependency) ---
    // Based on lz-string by pieroxy (MIT License)
    // https://github.com/pieroxy/lz-string

    const LZ = (() => {
      const keyStr = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-_';
      const baseReverseDic = {};
      for (let i = 0; i < keyStr.length; i++) baseReverseDic[keyStr[i]] = i;

      function compressToEncodedURIComponent(input) {
        if (input == null) return '';
        return _compress(input, 6, (a) => keyStr[a]);
      }

      function decompressFromEncodedURIComponent(input) {
        if (input == null || input === '') return null;
        input = input.replace(/ /g, '');
        return _decompress(input.length, 32, (index) => baseReverseDic[input[index]]);
      }

      function _compress(uncompressed, bitsPerChar, getCharFromInt) {
        let i, value;
        const context_dictionary = {};
        const context_dictionaryToCreate = {};
        let context_c = '';
        let context_wc = '';
        let context_w = '';
        let context_enlargeIn = 2;
        let context_dictSize = 3;
        let context_numBits = 2;
        const context_data = [];
        let context_data_val = 0;
        let context_data_position = 0;

        for (let ii = 0; ii < uncompressed.length; ii++) {
          context_c = uncompressed[ii];
          if (!Object.prototype.hasOwnProperty.call(context_dictionary, context_c)) {
            context_dictionary[context_c] = context_dictSize++;
            context_dictionaryToCreate[context_c] = true;
          }

          context_wc = context_w + context_c;
          if (Object.prototype.hasOwnProperty.call(context_dictionary, context_wc)) {
            context_w = context_wc;
          } else {
            if (Object.prototype.hasOwnProperty.call(context_dictionaryToCreate, context_w)) {
              if (context_w.charCodeAt(0) < 256) {
                for (i = 0; i < context_numBits; i++) {
                  context_data_val = (context_data_val << 1);
                  if (context_data_position == bitsPerChar - 1) { context_data_position = 0; context_data.push(getCharFromInt(context_data_val)); context_data_val = 0; }
                  else { context_data_position++; }
                }
                value = context_w.charCodeAt(0);
                for (i = 0; i < 8; i++) {
                  context_data_val = (context_data_val << 1) | (value & 1);
                  if (context_data_position == bitsPerChar - 1) { context_data_position = 0; context_data.push(getCharFromInt(context_data_val)); context_data_val = 0; }
                  else { context_data_position++; }
                  value = value >> 1;
                }
              } else {
                value = 1;
                for (i = 0; i < context_numBits; i++) {
                  context_data_val = (context_data_val << 1) | value;
                  if (context_data_position == bitsPerChar - 1) { context_data_position = 0; context_data.push(getCharFromInt(context_data_val)); context_data_val = 0; }
                  else { context_data_position++; }
                  value = 0;
                }
                value = context_w.charCodeAt(0);
                for (i = 0; i < 16; i++) {
                  context_data_val = (context_data_val << 1) | (value & 1);
                  if (context_data_position == bitsPerChar - 1) { context_data_position = 0; context_data.push(getCharFromInt(context_data_val)); context_data_val = 0; }
                  else { context_data_position++; }
                  value = value >> 1;
                }
              }
              context_enlargeIn--;
              if (context_enlargeIn == 0) { context_enlargeIn = Math.pow(2, context_numBits); context_numBits++; }
              delete context_dictionaryToCreate[context_w];
            } else {
              value = context_dictionary[context_w];
              for (i = 0; i < context_numBits; i++) {
                context_data_val = (context_data_val << 1) | (value & 1);
                if (context_data_position == bitsPerChar - 1) { context_data_position = 0; context_data.push(getCharFromInt(context_data_val)); context_data_val = 0; }
                else { context_data_position++; }
                value = value >> 1;
              }
            }
            context_enlargeIn--;
            if (context_enlargeIn == 0) { context_enlargeIn = Math.pow(2, context_numBits); context_numBits++; }
            context_dictionary[context_wc] = context_dictSize++;
            context_w = String(context_c);
          }
        }

        if (context_w !== '') {
          if (Object.prototype.hasOwnProperty.call(context_dictionaryToCreate, context_w)) {
            if (context_w.charCodeAt(0) < 256) {
              for (i = 0; i < context_numBits; i++) {
                context_data_val = (context_data_val << 1);
                if (context_data_position == bitsPerChar - 1) { context_data_position = 0; context_data.push(getCharFromInt(context_data_val)); context_data_val = 0; }
                else { context_data_position++; }
              }
              value = context_w.charCodeAt(0);
              for (i = 0; i < 8; i++) {
                context_data_val = (context_data_val << 1) | (value & 1);
                if (context_data_position == bitsPerChar - 1) { context_data_position = 0; context_data.push(getCharFromInt(context_data_val)); context_data_val = 0; }
                else { context_data_position++; }
                value = value >> 1;
              }
            } else {
              value = 1;
              for (i = 0; i < context_numBits; i++) {
                context_data_val = (context_data_val << 1) | value;
                if (context_data_position == bitsPerChar - 1) { context_data_position = 0; context_data.push(getCharFromInt(context_data_val)); context_data_val = 0; }
                else { context_data_position++; }
                value = 0;
              }
              value = context_w.charCodeAt(0);
              for (i = 0; i < 16; i++) {
                context_data_val = (context_data_val << 1) | (value & 1);
                if (context_data_position == bitsPerChar - 1) { context_data_position = 0; context_data.push(getCharFromInt(context_data_val)); context_data_val = 0; }
                else { context_data_position++; }
                value = value >> 1;
              }
            }
            context_enlargeIn--;
            if (context_enlargeIn == 0) { context_enlargeIn = Math.pow(2, context_numBits); context_numBits++; }
            delete context_dictionaryToCreate[context_w];
          } else {
            value = context_dictionary[context_w];
            for (i = 0; i < context_numBits; i++) {
              context_data_val = (context_data_val << 1) | (value & 1);
              if (context_data_position == bitsPerChar - 1) { context_data_position = 0; context_data.push(getCharFromInt(context_data_val)); context_data_val = 0; }
              else { context_data_position++; }
              value = value >> 1;
            }
          }
          context_enlargeIn--;
          if (context_enlargeIn == 0) { context_enlargeIn = Math.pow(2, context_numBits); context_numBits++; }
        }

        // Mark the end of the stream
        value = 2;
        for (i = 0; i < context_numBits; i++) {
          context_data_val = (context_data_val << 1) | (value & 1);
          if (context_data_position == bitsPerChar - 1) { context_data_position = 0; context_data.push(getCharFromInt(context_data_val)); context_data_val = 0; }
          else { context_data_position++; }
          value = value >> 1;
        }

        while (true) {
          context_data_val = (context_data_val << 1);
          if (context_data_position == bitsPerChar - 1) { context_data.push(getCharFromInt(context_data_val)); break; }
          else context_data_position++;
        }
        return context_data.join('');
      }

      function _decompress(length, resetValue, getNextValue) {
        const dictionary = [];
        let enlargeIn = 4, dictSize = 4, numBits = 3, entry = '', result = [];
        let next, i, w, c, bits, resb, maxpower, power;
        const data = { val: getNextValue(0), position: resetValue, index: 1 };

        for (i = 0; i < 3; i++) dictionary[i] = i;

        bits = 0; maxpower = Math.pow(2, 2); power = 1;
        while (power != maxpower) {
          resb = data.val & data.position;
          data.position >>= 1;
          if (data.position == 0) { data.position = resetValue; data.val = getNextValue(data.index++); }
          bits |= (resb > 0 ? 1 : 0) * power;
          power <<= 1;
        }

        switch (next = bits) {
          case 0: bits = 0; maxpower = Math.pow(2, 8); power = 1;
            while (power != maxpower) { resb = data.val & data.position; data.position >>= 1; if (data.position == 0) { data.position = resetValue; data.val = getNextValue(data.index++); } bits |= (resb > 0 ? 1 : 0) * power; power <<= 1; }
            c = String.fromCharCode(bits); break;
          case 1: bits = 0; maxpower = Math.pow(2, 16); power = 1;
            while (power != maxpower) { resb = data.val & data.position; data.position >>= 1; if (data.position == 0) { data.position = resetValue; data.val = getNextValue(data.index++); } bits |= (resb > 0 ? 1 : 0) * power; power <<= 1; }
            c = String.fromCharCode(bits); break;
          case 2: return '';
        }
        dictionary[3] = c; w = c; result.push(c);

        while (true) {
          if (data.index > length) return '';
          bits = 0; maxpower = Math.pow(2, numBits); power = 1;
          while (power != maxpower) { resb = data.val & data.position; data.position >>= 1; if (data.position == 0) { data.position = resetValue; data.val = getNextValue(data.index++); } bits |= (resb > 0 ? 1 : 0) * power; power <<= 1; }

          switch (c = bits) {
            case 0: bits = 0; maxpower = Math.pow(2, 8); power = 1;
              while (power != maxpower) { resb = data.val & data.position; data.position >>= 1; if (data.position == 0) { data.position = resetValue; data.val = getNextValue(data.index++); } bits |= (resb > 0 ? 1 : 0) * power; power <<= 1; }
              dictionary[dictSize++] = String.fromCharCode(bits); c = dictSize - 1; enlargeIn--; break;
            case 1: bits = 0; maxpower = Math.pow(2, 16); power = 1;
              while (power != maxpower) { resb = data.val & data.position; data.position >>= 1; if (data.position == 0) { data.position = resetValue; data.val = getNextValue(data.index++); } bits |= (resb > 0 ? 1 : 0) * power; power <<= 1; }
              dictionary[dictSize++] = String.fromCharCode(bits); c = dictSize - 1; enlargeIn--; break;
            case 2: return result.join('');
          }

          if (enlargeIn == 0) { enlargeIn = Math.pow(2, numBits); numBits++; }

          if (dictionary[c]) { entry = dictionary[c]; }
          else { if (c === dictSize) { entry = w + w[0]; } else { return null; } }

          result.push(entry);
          dictionary[dictSize++] = w + entry[0];
          enlargeIn--;
          if (enlargeIn == 0) { enlargeIn = Math.pow(2, numBits); numBits++; }
          w = entry;
        }
      }

      return { compress: compressToEncodedURIComponent, decompress: decompressFromEncodedURIComponent };
    })();

    function encodeSDP(sdpObj) {
      const json = JSON.stringify(sdpObj);
      const encoded = LZ.compress(json);
      // Show compression stats
      const origSize = btoa(json).length;
      const sizeEl = document.getElementById('sdp-size');
      sizeEl.textContent = `${encoded.length}文字 (圧縮前: ${origSize}文字 → ${Math.round((1 - encoded.length / origSize) * 100)}%削減)`;
      return encoded;
    }

    function decodeSDP(encoded) {
      // Remove any whitespace/newlines that chat apps might add
      const cleaned = encoded.replace(/\s/g, '');
      const json = LZ.decompress(cleaned);
      if (!json) throw new Error('展開に失敗しました');
      return JSON.parse(json);
    }

    async function createOffer() {
      isHost = true;
      setStatus('接続待ち...', 'connecting');
      createPeerConnection();

      const channel = pc.createDataChannel('game');
      setupDataChannel(channel);

      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);

      // Wait for ICE gathering to complete
      await new Promise((resolve) => {
        if (pc.iceGatheringState === 'complete') {
          resolve();
        } else {
          pc.onicegatheringstatechange = () => {
            if (pc.iceGatheringState === 'complete') resolve();
          };
        }
      });

      const encoded = encodeSDP(pc.localDescription);

      document.getElementById('sdp-title').textContent = '2. ホスト: SDP交換';
      document.getElementById('sdp-instruction').textContent =
        '下のテキストをコピーして、チャットツールで相手に送ってください。';
      document.getElementById('sdp-local').value = encoded;
      document.getElementById('sdp-paste-instruction').textContent =
        '相手から受け取ったAnswer SDPを貼り付けてください。';
      document.getElementById('apply-btn').textContent = '接続を確立';
      sdpSection.style.display = '';
      document.getElementById('role-section').style.display = 'none';
    }

    function showGuestUI() {
      isHost = false;
      setStatus('SDP入力待ち...', 'connecting');

      document.getElementById('sdp-title').textContent = '2. ゲスト: SDP交換';
      document.getElementById('sdp-instruction').textContent = '';
      document.getElementById('sdp-local').style.display = 'none';
      document.querySelector('[onclick="copySDP()"]').style.display = 'none';
      document.getElementById('sdp-paste-instruction').textContent =
        'ホストから受け取ったOffer SDPを貼り付けてください。';
      document.getElementById('apply-btn').textContent = 'Answer SDPを生成';
      sdpSection.style.display = '';
      document.getElementById('role-section').style.display = 'none';
    }

    async function applyRemoteSDP() {
      const remoteText = document.getElementById('sdp-remote').value.trim();
      if (!remoteText) {
        alert('SDPを貼り付けてください');
        return;
      }

      try {
        const remoteSDP = decodeSDP(remoteText);

        if (isHost) {
          // Host receives Answer
          await pc.setRemoteDescription(new RTCSessionDescription(remoteSDP));
        } else {
          // Guest receives Offer, creates Answer
          createPeerConnection();
          pc.ondatachannel = (e) => setupDataChannel(e.channel);

          await pc.setRemoteDescription(new RTCSessionDescription(remoteSDP));
          const answer = await pc.createAnswer();
          await pc.setLocalDescription(answer);

          // Wait for ICE gathering
          await new Promise((resolve) => {
            if (pc.iceGatheringState === 'complete') {
              resolve();
            } else {
              pc.onicegatheringstatechange = () => {
                if (pc.iceGatheringState === 'complete') resolve();
              };
            }
          });

          const encoded = encodeSDP(pc.localDescription);

          // Show the Answer SDP for the guest to copy
          document.getElementById('sdp-instruction').textContent =
            '下のAnswer SDPをコピーしてホストに送ってください。';
          document.getElementById('sdp-local').style.display = '';
          document.getElementById('sdp-local').value = encoded;
          document.querySelector('[onclick="copySDP()"]').style.display = '';

          // Hide the paste area
          document.getElementById('sdp-paste-instruction').style.display = 'none';
          document.getElementById('sdp-remote').style.display = 'none';
          document.getElementById('apply-btn').style.display = 'none';
        }
      } catch (e) {
        alert('SDPの読み取りに失敗しました: ' + e.message);
      }
    }

    function copySDP() {
      const text = document.getElementById('sdp-local').value;
      navigator.clipboard.writeText(text).then(() => {
        const btn = document.querySelector('[onclick="copySDP()"]');
        btn.textContent = 'コピーしました！';
        setTimeout(() => btn.textContent = 'SDPをコピー', 2000);
      });
    }

    function sendMessage() {
      const input = document.getElementById('chat-input');
      const msg = input.value.trim();
      if (!msg || !dc || dc.readyState !== 'open') return;
      dc.send(msg);
      addChatMsg('自分: ' + msg, 'self');
      input.value = '';
    }
  </script>
</body>
</html>
